name: Agentic Pipeline — Acquire & Ingest

on:
  # Run weekly on Monday at 0600 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Allow manual trigger with options
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-ingest all PDFs (not just new ones)'
        required: false
        default: 'false'
        type: boolean
      series:
        description: 'AFI series to acquire (e.g. 31,32,36 or "all")'
        required: false
        default: 'all'
        type: string
      skip_analysis:
        description: 'Skip analysis step (faster)'
        required: false
        default: 'false'
        type: boolean

jobs:
  acquire-and-ingest:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install anthropic chromadb pymupdf sentence-transformers playwright

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Acquire new AFI PDFs
        env:
          SERIES: ${{ github.event.inputs.series || 'all' }}
        run: |
          python3 scripts/acquire_pdfs.py --series "$SERIES"

      - name: Run pipeline (ingest + analyze + build index)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_ANALYSIS: ${{ github.event.inputs.skip_analysis == 'true' && '1' || '' }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python3 scripts/run_pipeline.py $FORCE_FLAG

      - name: Commit and push changes
        run: |
          git config user.name "AFI Pipeline Bot"
          git config user.email "pipeline@afi-intelligence"

          # Only commit if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add wiki/ chroma_db/ corpus_index.json
          git commit -m "Pipeline: automated acquisition and ingest $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger site deploy
        run: |
          echo "Changes pushed — deploy.yml will trigger automatically"
          echo "Site will be live at: https://lindseybruckbauer.github.io/afi-intelligence/"
