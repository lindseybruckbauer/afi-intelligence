site_name: AFI Policy Intelligence
site_url: https://lindseybruckbauer.github.io/afi-intelligence
site_description: >
  AI-powered gap, overlap, and authority analysis across Air Force Instructions.
  Unofficial tool — not affiliated with the U.S. Air Force or Department of Defense.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tooltips
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: Roboto Mono

docs_dir: wiki
site_dir: site

markdown_extensions:
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/marked/marked.min.js
  - https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js
  - https://d3js.org/d3.v7.min.js
  - javascripts/graph.js
  - javascripts/chat.js

nav:
  - Home: index.md
  - Analysis:
    - Overlaps & Conflicts: ANALYSIS_overlaps.md
    - Policy Gaps: ANALYSIS_gaps.md
    - Authority Matrix: ANALYSIS_authority_matrix.md
  - Publications: publications.md
  - Graph: graph.md
  - Chat: chat.md
